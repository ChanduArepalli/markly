version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: markly-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-markly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-markly_secret}
      POSTGRES_DB: ${POSTGRES_DB:-markly}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5444:5432"
    networks:
      - markly-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-markly}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: ../../docker/api.Dockerfile
    container_name: markly-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-markly}:${POSTGRES_PASSWORD:-markly_secret}@db:5432/${POSTGRES_DB:-markly}
    # Volumes removed for production to use built image content
    ports:
      - "8000:8000"
    networks:
      - markly-net
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: ./apps/web
      dockerfile: ../../docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api-markly.chanduarepalli.com}
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY}
    container_name: markly-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    # Volumes removed for production to use built image content
    ports:
      - "3000:3000"
    networks:
      - markly-net
    depends_on:
      - api

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: markly-tunnel
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    networks:
      - markly-net
    depends_on:
      - api
      - web

volumes:
  postgres_data:

networks:
  markly-net:
    driver: bridge
